name: "✨ 기능 구현"
description: "새로운 기능을 제안하거나 구현할 때 사용해주세요"
labels: ["feature"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 구현하려는 기능을 설명해주세요
      placeholder: "예: 사용자가 이메일로 로그인할 수 있는 API를 구현합니다"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 구현에 필요한 세부 작업을 체크리스트로 작성해주세요
      placeholder: |
        - [ ] Controller 작성
        - [ ] Service 로직 구현
        - [ ] Repository 구현
        - [ ] 테스트 코드 작성
    validations:
      required: true

  - type: textarea
    id: api-spec
    attributes:
      label: API 스펙 (선택)
      description: API 엔드포인트가 있다면 간단히 작성해주세요
      placeholder: |
        - Method: POST
        - URL: /api/v1/auth/login
        - Request Body: { email, password }
        - Response: { accessToken, refreshToken }
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 추가로 공유할 내용이 있다면 작성해주세요
    validations:
      required: false
