name: PR Check

on:
  pull_request:
    branches: [dev, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run detekt
        run: ./gradlew detekt --no-daemon

      - name: Build (without native)
        run: ./gradlew build -x test --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: local

      # 실제 Oracle(gvenzl/oracle-free) 컨테이너 통합 테스트 (M0-5)
      # GitHub Actions 러너에는 Docker가 기본 설치되어 있어 Testcontainers가 바로 동작한다
      - name: Run integration tests (Oracle Testcontainers)
        run: ./gradlew integrationTest --no-daemon

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: |
            build/reports/tests/
            build/reports/ktlint/
            build/reports/detekt/
          retention-days: 7
