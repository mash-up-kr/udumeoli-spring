# Datasource
spring.datasource.url=jdbc:oracle:thin:@udumeolidb_medium?TNS_ADMIN=/opt/oracle/wallet
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=APP_USER
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# PKCS12 wallet (GraalVM Native 호환)
javax.net.ssl.trustStore=/opt/oracle/wallet/truststore.jks
javax.net.ssl.trustStorePassword=${WALLET_PASSWORD}
javax.net.ssl.keyStore=/opt/oracle/wallet/keystore.jks
javax.net.ssl.keyStorePassword=${WALLET_PASSWORD}