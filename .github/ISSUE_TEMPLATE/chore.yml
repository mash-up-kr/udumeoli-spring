name: "🔧 문서/설정"
description: "문서 작성, 설정 변경, 의존성 업데이트 등에 사용해주세요"
labels: ["chore"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: 작업 설명
      description: 어떤 작업인지 설명해주세요
      placeholder: "예: Docker Compose 설정 파일을 추가합니다"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업을 체크리스트로 작성해주세요
      placeholder: |
        - [ ] docker-compose.yml 작성
        - [ ] .env.example 추가
        - [ ] README에 실행 방법 추가
    validations:
      required: true
