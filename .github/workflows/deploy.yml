name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build native Docker image
        run: |
          docker build \
            -t udumeoli-backend:${{ github.sha }} \
            -t udumeoli-backend:latest \
            .

      - name: Save image
        run: docker save udumeoli-backend:latest | gzip > image.tar.gz

      - name: Check image size
        run: ls -lh image.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "image.tar.gz"
          target: "/home/deploy/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/deploy
            docker load < image.tar.gz

            cd /home/deploy/app
            docker compose down
            docker compose up -d

            rm /home/deploy/image.tar.gz
            docker image prune -f

            echo "Deploy complete: ${{ github.sha }}"

      - name: Wait for app to start
        run: sleep 30

      - name: Health check
        run: |
          curl -f http://${{ secrets.SERVER_HOST }}/actuator/health \
            || (echo "❌ Health check failed" && exit 1)
