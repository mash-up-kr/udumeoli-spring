spring.application.name=TripPhoto

# GraphQL
spring.graphql.graphiql.enabled=true

# Actuator (Nginx가 /actuator/health만 통과시킴)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Object Storage — OCI Object Storage의 S3 호환 API (이미지 파이프라인)
# env 미설정 시 로컬 MinIO 기본값으로 폴백한다: 스토리지 env가 빠져도 부팅은 되고,
# 스토리지를 실제로 쓰는 요청만 실패하게 하기 위함 (배포 안전장치)
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.region=${STORAGE_REGION:us-east-1}
storage.bucket=${STORAGE_BUCKET:photato-image}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:http://localhost:9000/photato-image}
storage.upload.url-ttl=${STORAGE_UPLOAD_URL_TTL:5m}
storage.upload.max-size-bytes=${STORAGE_UPLOAD_MAX_SIZE_BYTES:10485760}

# 썸네일 생성 서버(Go) base URL — 빈 값이면 생성 요청을 건너뛴다 (로컬 개발·테스트)
# 완료 콜백은 없다: 썸네일 서버가 image.thumbnail_url을 DB에 직접 UPDATE한다
thumbnail.server-url=${THUMBNAIL_SERVER_URL:}

# RestClient 기본 타임아웃 — 썸네일 서버가 느려도 요청 스레드를 오래 붙잡지 않게
spring.http.client.connect-timeout=2s
spring.http.client.read-timeout=5s
